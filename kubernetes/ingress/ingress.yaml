apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cloud-devops-ingress
  namespace: ivolve
spec:
  rules:
    - host: cloud-devops.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cloud-devops-service
                port:
                  number: 80
